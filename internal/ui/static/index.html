<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>engrafo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; display: flex; flex-direction: column; height: 100vh; }
header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 1rem; font-weight: 600; color: #58a6ff; }
#ctx-summary { font-size: 0.8rem; color: #8b949e; }
#search { margin-left: auto; padding: 6px 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #e6edf3; font-size: 0.85rem; width: 240px; }
#search::placeholder { color: #484f58; }
.tabs { display: flex; gap: 0; border-bottom: 1px solid #30363d; padding: 0 20px; background: #161b22; }
.tab { padding: 8px 16px; font-size: 0.85rem; cursor: pointer; border-bottom: 2px solid transparent; color: #8b949e; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
main { display: flex; flex: 1; overflow: hidden; }
#list { width: 320px; border-right: 1px solid #30363d; overflow-y: auto; flex-shrink: 0; }
.node-item { padding: 10px 16px; border-bottom: 1px solid #21262d; cursor: pointer; font-size: 0.83rem; }
.node-item:hover, .node-item.selected { background: #1c2128; }
.node-item .sym { font-weight: 600; color: #79c0ff; word-break: break-all; }
.node-item .meta { color: #8b949e; font-size: 0.75rem; margin-top: 2px; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 500; margin-right: 4px; }
.kind-function   { background: #1a3c4a; color: #79c0ff; }
.kind-method     { background: #1a3c2a; color: #56d364; }
.kind-class      { background: #3a2c1a; color: #f0883e; }
.kind-interface  { background: #2c1a3a; color: #d2a8ff; }
.kind-package    { background: #2a2a1a; color: #e3b341; }
.kind-file       { background: #1e1e1e; color: #8b949e; }
.kind-external   { background: #1e1e1e; color: #484f58; }
#detail { flex: 1; padding: 20px; overflow-y: auto; }
#detail h2 { font-size: 1rem; color: #58a6ff; margin-bottom: 12px; }
.section { margin-bottom: 16px; }
.section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
.edge-item { padding: 4px 0; font-size: 0.82rem; color: #e6edf3; }
.edge-item .edge-sym { color: #79c0ff; }
.edge-item .edge-via { color: #8b949e; font-size: 0.75rem; }
.empty { color: #484f58; font-size: 0.82rem; font-style: italic; }
#deadcode-view { display: none; padding: 20px; overflow-y: auto; flex: 1; }
#deadcode-view h2 { font-size: 0.9rem; color: #f0883e; margin-bottom: 12px; }
.dead-item { padding: 8px 12px; margin-bottom: 4px; border-radius: 6px; background: #1c2128; font-size: 0.82rem; }
.dead-item .dead-sym { color: #79c0ff; font-weight: 600; }
.dead-item .dead-meta { color: #8b949e; font-size: 0.75rem; margin-top: 2px; }
.orphan-label { color: #f85149; }
.abandoned-label { color: #f0883e; }
#loading { padding: 40px; text-align: center; color: #8b949e; }
#viz-view { display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; }
#viz-toolbar { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; }
#viz-root-select { padding: 4px 8px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; color: #e6edf3; font-size: 0.8rem; }
#viz-hint { color: #8b949e; font-size: 0.75rem; }
#viz-canvas-wrap { flex: 1; overflow: hidden; position: relative; }
#viz-canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<header>
  <h1>⬡ engrafo</h1>
  <span id="ctx-summary">loading…</span>
  <input id="search" placeholder="search symbols…" autocomplete="off">
</header>
<div class="tabs">
  <div class="tab active" data-tab="graph">Graph</div>
  <div class="tab" data-tab="viz">Grafo</div>
  <div class="tab" data-tab="deadcode">Dead Code</div>
</div>
<main>
  <div id="list"><div id="loading">loading nodes…</div></div>
  <div id="detail"><div class="empty">select a node</div></div>
  <div id="deadcode-view"><div id="loading2">loading…</div></div>
  <div id="viz-view">
    <div id="viz-toolbar">
      <label for="viz-root-select">Raíz:</label>
      <select id="viz-root-select"><option value="">Todas</option></select>
      <span id="viz-hint">Drag nodos · Rueda = zoom · Arrastra fondo = pan · Click = detalle</span>
    </div>
    <div id="viz-canvas-wrap">
      <canvas id="viz-canvas"></canvas>
    </div>
  </div>
</main>

<script>
const api = path => fetch(path).then(r => r.json());

let allNodes = [];
let currentTab = 'graph';

function kindBadge(kind) {
  return `<span class="badge kind-${kind}">${kind}</span>`;
}

function renderNodeItem(n, idx) {
  return `<div class="node-item" data-idx="${idx}">
    <div class="sym">${n.symbol}</div>
    <div class="meta">${kindBadge(n.kind)} ${n.file_path}</div>
  </div>`;
}

function renderList(nodes) {
  const list = document.getElementById('list');
  if (!nodes.length) { list.innerHTML = '<div class="empty" style="padding:16px">no results</div>'; return; }
  list.innerHTML = nodes.map((n, i) => renderNodeItem(n, i)).join('');
  list.querySelectorAll('.node-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.node-item').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      loadDetail(nodes[+el.dataset.idx]);
    });
  });
}

function loadDetail(n) {
  const d = document.getElementById('detail');
  d.innerHTML = '<div class="empty">loading…</div>';
  api(`/api/node?symbol=${encodeURIComponent(n.symbol)}&kind=${encodeURIComponent(n.kind)}`)
    .then(data => {
      const nd = data.node || {};
      const edgeList = arr => arr && arr.length
        ? arr.map(e => `<div class="edge-item"><span class="edge-sym">${e.symbol}</span> <span class="edge-via">${e.file_path} · ${e.edge_kind || e.EdgeKind || ''}</span></div>`).join('')
        : '<div class="empty">none</div>';
      d.innerHTML = `
        <h2>${n.symbol}</h2>
        <div class="section">
          <div class="section-title">location</div>
          <div style="font-size:0.82rem;color:#8b949e">${nd.file_path}:${nd.line_start}–${nd.line_end} · ${nd.language}</div>
        </div>
        <div class="section">
          <div class="section-title">depends on</div>
          ${edgeList(data.depends_on)}
        </div>
        <div class="section">
          <div class="section-title">used by</div>
          ${edgeList(data.used_by)}
        </div>
        ${(data.historical_edges && data.historical_edges.length) ? `
        <div class="section">
          <div class="section-title">historical edges (invalidated)</div>
          ${edgeList(data.historical_edges)}
        </div>` : ''}
        ${(data.anchored_observations && data.anchored_observations.length) ? `
        <div class="section">
          <div class="section-title">engram anchors</div>
          ${data.anchored_observations.map(id => `<div class="edge-item" style="color:#d2a8ff">${id}</div>`).join('')}
        </div>` : ''}
      `;
    })
    .catch(() => { d.innerHTML = '<div class="empty">error loading node</div>'; });
}

function renderDeadcode() {
  api('/api/deadcode').then(data => {
    const v = document.getElementById('deadcode-view');
    const orphanHTML = (data.orphans || []).map(o =>
      `<div class="dead-item"><span class="orphan-label">orphan</span> <span class="dead-sym">${o.symbol}</span>
       <div class="dead-meta">${o.kind} · ${o.file_path}</div></div>`
    ).join('') || '<div class="empty">none</div>';
    const abandonHTML = (data.abandoned || []).map(a =>
      `<div class="dead-item"><span class="abandoned-label">abandoned</span> <span class="dead-sym">${a.symbol}</span>
       <div class="dead-meta">${a.kind} · ${a.file_path} · peak=${a.peak_incoming_edges} · ${Math.round(a.days_since_abandoned)}d ago</div></div>`
    ).join('') || '<div class="empty">none</div>';
    v.innerHTML = `
      <h2>Orphans (${(data.orphans||[]).length})</h2>${orphanHTML}
      <h2 style="margin-top:20px">Abandoned (${(data.abandoned||[]).length})</h2>${abandonHTML}
    `;
  });
}

// Init
api('/api/context').then(ctx => {
  const langs = (ctx.languages || []).join(', ') || '—';
  const stats = ctx.stats || {};
  document.getElementById('ctx-summary').textContent =
    `${stats.total_nodes || 0} symbols · ${langs}`;
});

api('/api/nodes').then(nodes => {
  allNodes = nodes || [];
  renderList(allNodes);
});

// Search
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim();
  if (!q) { renderList(allNodes); return; }
  api(`/api/search?q=${encodeURIComponent(q)}&limit=50`).then(data => {
    renderList(data.results || []);
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    const listEl  = document.getElementById('list');
    const detailEl = document.getElementById('detail');
    const dcEl    = document.getElementById('deadcode-view');
    const vizEl   = document.getElementById('viz-view');
    listEl.style.display   = currentTab === 'graph' ? '' : 'none';
    detailEl.style.display = currentTab === 'graph' ? '' : 'none';
    dcEl.style.display     = currentTab === 'deadcode' ? 'block' : 'none';
    vizEl.style.display    = currentTab === 'viz' ? 'flex' : 'none';
    if (currentTab === 'deadcode') renderDeadcode();
    if (currentTab === 'viz') vizActivate();
  });
});

// ── Grafo force-directed ──────────────────────────────────────────────────────
const viz = (() => {
  const KIND_COLORS = {
    function:  '#79c0ff', method: '#56d364', class: '#f0883e',
    interface: '#d2a8ff', package: '#e3b341', file: '#8b949e', external: '#484f58',
  };
  const ROOT_TINTS = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#e3b341','#ff7b72','#79c0ff','#56d364'];

  let nodes = [], edges = [], rootTintMap = {};
  let simNodes = [], adjMap = {};
  let scale = 1, panX = 0, panY = 0;
  let dragNode = null, dragOffX = 0, dragOffY = 0;
  let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
  let rafId = null, warmupDone = false;
  let canvasW = 0, canvasH = 0;
  let canvas, ctx;

  function colorFor(kind) { return KIND_COLORS[kind] || '#8b949e'; }
  function tintFor(root)  { return rootTintMap[root] || '#ffffff'; }

  function toScreen(wx, wy) {
    return [wx * scale + panX, wy * scale + panY];
  }
  function toWorld(sx, sy) {
    return [(sx - panX) / scale, (sy - panY) / scale];
  }

  function resize() {
    const wrap = document.getElementById('viz-canvas-wrap');
    canvasW = wrap.clientWidth  || 800;
    canvasH = wrap.clientHeight || 600;
    canvas.width  = canvasW;
    canvas.height = canvasH;
  }

  function initPositions() {
    // Distribuir en círculo para dar semilla al simulador
    const n = simNodes.length;
    const R = Math.min(canvasW, canvasH) * 0.35;
    simNodes.forEach((sn, i) => {
      const a = (2 * Math.PI * i) / Math.max(n, 1);
      sn.x  = canvasW / 2 + R * Math.cos(a);
      sn.y  = canvasH / 2 + R * Math.sin(a);
      sn.vx = 0; sn.vy = 0;
      sn.pinned = false;
    });
    panX = 0; panY = 0; scale = 1;
  }

  const REPULSION  = 3000;
  const SPRING_K   = 0.04;
  const SPRING_LEN = 120;
  const CENTER_K   = 0.003;
  const DAMPING    = 0.85;

  function step() {
    const n = simNodes.length;
    for (let i = 0; i < n; i++) {
      simNodes[i].fx = 0; simNodes[i].fy = 0;
    }
    // Repulsión (Coulomb)
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const dx = simNodes[j].x - simNodes[i].x;
        const dy = simNodes[j].y - simNodes[i].y;
        const dist2 = dx * dx + dy * dy + 0.01;
        const f = REPULSION / dist2;
        const fx = f * dx / Math.sqrt(dist2);
        const fy = f * dy / Math.sqrt(dist2);
        simNodes[i].fx -= fx; simNodes[i].fy -= fy;
        simNodes[j].fx += fx; simNodes[j].fy += fy;
      }
    }
    // Resortes (Hooke) por aristas
    edges.forEach(e => {
      const a = adjMap[e.from]; const b = adjMap[e.to];
      if (!a || !b) return;
      const dx = b.x - a.x; const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
      const f = SPRING_K * (dist - SPRING_LEN);
      const fx = f * dx / dist; const fy = f * dy / dist;
      if (!a.pinned) { a.fx += fx; a.fy += fy; }
      if (!b.pinned) { b.fx -= fx; b.fy -= fy; }
    });
    // Centrado
    simNodes.forEach(sn => {
      if (sn.pinned) return;
      sn.fx += CENTER_K * (canvasW / 2 - sn.x);
      sn.fy += CENTER_K * (canvasH / 2 - sn.y);
      sn.vx = (sn.vx + sn.fx) * DAMPING;
      sn.vy = (sn.vy + sn.fy) * DAMPING;
      sn.x += sn.vx;
      sn.y += sn.vy;
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    // Aristas
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#30363d';
    edges.forEach(e => {
      const a = adjMap[e.from]; const b = adjMap[e.to];
      if (!a || !b) return;
      const [ax, ay] = toScreen(a.x, a.y);
      const [bx, by] = toScreen(b.x, b.y);
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    });

    // Nodos
    const R = Math.max(5, Math.min(10, scale * 8));
    simNodes.forEach(sn => {
      const [sx, sy] = toScreen(sn.x, sn.y);
      if (sx < -R || sx > canvasW + R || sy < -R || sy > canvasH + R) return;
      ctx.beginPath(); ctx.arc(sx, sy, R, 0, 2 * Math.PI);
      ctx.fillStyle = colorFor(sn.kind);
      ctx.fill();
      // borde tintado por raíz
      ctx.strokeStyle = tintFor(sn.root);
      ctx.lineWidth = 2;
      ctx.stroke();
      // etiqueta
      if (scale > 0.5) {
        ctx.fillStyle = '#e6edf3';
        ctx.font = `${Math.max(9, 11 * scale)}px system-ui,sans-serif`;
        ctx.fillText(sn.symbol.length > 18 ? sn.symbol.slice(0, 16) + '…' : sn.symbol, sx + R + 3, sy + 4);
      }
    });
  }

  function loop() {
    step(); draw();
    rafId = requestAnimationFrame(loop);
  }

  function warmup(iter) {
    for (let i = 0; i < iter; i++) step();
    warmupDone = true;
  }

  function loadGraph(rootName) {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    warmupDone = false;
    const url = rootName ? `/api/graph?root=${encodeURIComponent(rootName)}` : '/api/graph';
    api(url).then(data => {
      nodes = data.nodes || [];
      edges = data.edges || [];
      // Mapa raíz → tinte
      const roots = [...new Set(nodes.map(n => n.root))];
      rootTintMap = {};
      roots.forEach((r, i) => { rootTintMap[r] = ROOT_TINTS[i % ROOT_TINTS.length]; });
      // Mapa id → simNode
      adjMap = {};
      simNodes = nodes.map(n => {
        const sn = { id: n.id, symbol: n.symbol, kind: n.kind, file_path: n.file_path, root: n.root, x: 0, y: 0, vx: 0, vy: 0, fx: 0, fy: 0, pinned: false };
        adjMap[n.id] = sn;
        return sn;
      });
      resize();
      initPositions();
      warmup(200);
      rafId = requestAnimationFrame(loop);
    }).catch(() => {
      nodes = []; edges = []; simNodes = []; adjMap = {};
    });
  }

  function nodeAt(sx, sy) {
    const R = Math.max(5, Math.min(10, scale * 8)) + 4;
    for (const sn of simNodes) {
      const [nx, ny] = toScreen(sn.x, sn.y);
      const dx = sx - nx; const dy = sy - ny;
      if (dx * dx + dy * dy <= R * R) return sn;
    }
    return null;
  }

  function attach(cvs) {
    canvas = cvs; ctx = canvas.getContext('2d');

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
      panX = mx - delta * (mx - panX);
      panY = my - delta * (my - panY);
      scale *= delta;
    }, { passive: false });

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left; const sy = e.clientY - rect.top;
      const hit = nodeAt(sx, sy);
      if (hit) {
        dragNode = hit;
        const [wx, wy] = toWorld(sx, sy);
        dragOffX = wx - hit.x; dragOffY = wy - hit.y;
        hit.pinned = true;
      } else {
        isPanning = true;
        panStartX = sx; panStartY = sy;
        panStartPanX = panX; panStartPanY = panY;
      }
    });

    window.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left; const sy = e.clientY - rect.top;
      if (dragNode) {
        const [wx, wy] = toWorld(sx, sy);
        dragNode.x = wx - dragOffX; dragNode.y = wy - dragOffY;
      } else if (isPanning) {
        panX = panStartPanX + (sx - panStartX);
        panY = panStartPanY + (sy - panStartY);
      }
    });

    window.addEventListener('mouseup', e => {
      if (dragNode) { dragNode.pinned = false; dragNode = null; }
      isPanning = false;
    });

    canvas.addEventListener('click', e => {
      if (dragNode) return;
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left; const sy = e.clientY - rect.top;
      const hit = nodeAt(sx, sy);
      if (hit) loadDetail({ symbol: hit.symbol, kind: hit.kind });
    });

    window.addEventListener('resize', () => { if (currentTab === 'viz') { resize(); } });
  }

  return { attach, loadGraph };
})();

let vizLoaded = false;
function vizActivate() {
  if (!vizLoaded) {
    viz.attach(document.getElementById('viz-canvas'));
    // Poblar selector de raíces
    api('/api/context').then(ctx => {
      const sel = document.getElementById('viz-root-select');
      (ctx.roots || []).forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.name; opt.textContent = r.name;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', () => viz.loadGraph(sel.value));
    });
    viz.loadGraph('');
    vizLoaded = true;
  }
}
</script>
</body>
</html>
